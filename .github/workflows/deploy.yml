name: Deploy Auth Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and deploy with Docker
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          Write-Host "Building Docker image..."
          docker build -t auth-service:latest .

          Write-Host "Restarting container..."
          try {
            docker rm -f auth-service 2>$null | Out-Null
          } catch {
            Write-Host "Container did not exist yet; continuing."
          }

          $portInUse = netstat -ano -p tcp | Select-String ':3001'
          if ($portInUse) {
            Write-Host "Port 3001 is already in use. Attempting to release it."
            $lines = $portInUse | Select-Object -First 5
            foreach ($line in $lines) {
              $parts = ($line -split '\s+').Where({ $_ })
              if ($parts.Count -ge 5) {
                $pid = $parts[-1]
                if ($pid -match '^\d+$') {
                  Stop-Process -Id $pid -Force -ErrorAction SilentlyContinue
                }
              }
            }
          }

          docker run -d `
            --name auth-service `
            --restart unless-stopped `
            -p 3001:3001 `
            --env-file .env `
            auth-service:latest

          Write-Host "Deployment completed successfully."
