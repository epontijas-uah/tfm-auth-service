name: Deploy Auth Service

on: push

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and deploy with Docker
        shell: powershell
        run: |
            $ErrorActionPreference = 'Stop'

            Write-Host "Building Docker image..."
            docker build -t auth-service:latest .

            Write-Host "Restarting container..."
            try { docker rm -f auth-service 2>$null | Out-Null } catch {}

            if (Test-Path .env) {
            docker run -d `
                --name auth-service `
                --restart unless-stopped `
                -p 3001:3001 `
                --env-file .env `
                auth-service:latest
            } else {
            docker run -d `
                --name auth-service `
                --restart unless-stopped `
                -p 3001:3001 `
                auth-service:latest
            }

            Write-Host "Deployment completed successfully."
